name: Build Android APK

on:
  push:
    branches: [ "master", "main", "dev" ]
  pull_request:
    branches: [ "master", "main", "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Android NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;21.4.7075529"

    - name: Create API_KEYS
      run: |
        echo "APP_ID=${{ secrets.TG_APP_ID || '123' }}" > API_KEYS
        echo "APP_HASH=\"${{ secrets.TG_APP_HASH || 'dummy' }}\"" >> API_KEYS
        echo "MAPS_V2_API=\"${{ secrets.MAPS_API_KEY || 'dummy' }}\"" >> API_KEYS
        echo "SIGNING_KEY_STORE_PASSWORD=dummy" >> API_KEYS
        echo "SIGNING_KEY_ALIAS=dummy" >> API_KEYS
        echo "SIGNING_KEY_PASSWORD=dummy" >> API_KEYS

    - name: Strip Signing Config
      run: |
        sed -i '/signingConfig signingConfigs.release/d' TMessagesProj/build.gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleAfatRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ayugram-unsigned-apk
        path: TMessagesProj/build/outputs/apk/afat/release/*.apk
