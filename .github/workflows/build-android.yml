name: Build Android APK

on:
  push:
    branches: [ "master", "main", "dev" ]
  pull_request:
    branches: [ "master", "main", "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Create dummy API_KEYS
      run: |
        echo "APP_ID=123" > API_KEYS
        echo "APP_HASH=\"dummy\"" >> API_KEYS
        echo "MAPS_V2_API=\"dummy\"" >> API_KEYS
        echo "SIGNING_KEY_STORE_PASSWORD=dummy" >> API_KEYS
        echo "SIGNING_KEY_ALIAS=dummy" >> API_KEYS
        echo "SIGNING_KEY_PASSWORD=dummy" >> API_KEYS

    - name: Strip Signing Config
      run: |
        sed -i '/signingConfig signingConfigs.release/d' TMessagesProj/build.gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleAfatRelease

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: ayugram-unsigned-apk
        path: TMessagesProj/build/outputs/apk/afat/release/*.apk
